# GPU override for Linux + NVIDIA hosts (requires the NVIDIA Container Toolkit).
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# The base docker-compose.yml runs Ollama CPU-only (correct for macOS).
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
